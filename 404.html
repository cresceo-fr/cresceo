<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Cresceo</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bleu-profond: #112331;
      --vert-tech: #079b85;
      --orange-signal: #f9a937;
      --blanc: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bleu-profond);
      color: var(--blanc);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .logo img { height: 44px; width: auto; }
    .logo span {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--blanc);
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      color: var(--vert-tech);
      line-height: 1;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 2rem;
      max-width: 400px;
    }
    .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: var(--vert-tech);
      color: var(--blanc);
      text-decoration: none;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #068a76; }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <img src="/assets/icon.png" alt="Cresceo" width="44" height="44">
    <span>Cresceo</span>
  </a>
  <h1>404</h1>
  <p>Cette page n'existe pas ou a été déplacée.</p>
  <a href="/" class="btn">Retour à l'accueil</a>
</body>
</html>
